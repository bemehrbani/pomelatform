version: '3.9'

services:
  pometesters:
    build: .
    image: pometesters:latest
    container_name: pometesters
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - HOSTNAME=0.0.0.0
    # Run migrations on startup (using npx prisma db push for sqlite to ensure file creation)
    command: >
      sh -c "npx prisma db push && node server.js"
